# Leapcell Deployment Configuration for RiderVoiceAI Backend
# https://leapcell.io/docs

name: ridervoice-backend

build:
  type: python
  python_version: "3.11"
  install_command: pip install -r requirements.txt

run:
  command: uvicorn app.main:app --host 0.0.0.0 --port $PORT

resources:
  min_instances: 1
  max_instances: 3

health_check:
  path: /health
  interval: 30
  timeout: 10

env:
  # Leapcell 대시보드 > Environment Variables에서 설정
  # DATABASE_URL: postgresql://USER:PASSWORD@HOST:5432/DATABASE
  # API_KEY: your-api-key
  # ADMIN_KEY: your-admin-key
  # SECRET_KEY: your-secret-key
  DEBUG: "false"
  HOST: "0.0.0.0"
